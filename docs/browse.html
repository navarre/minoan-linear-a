<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Linear A Corpus Browser</title>
<link rel="stylesheet" href="style.css">
<script src="nav.js" defer></script>
<style>
.browser { max-width: 1400px; margin: 0 auto; padding: 1rem 2rem; display: flex; gap: 1.5rem; min-height: 80vh; }
.sidebar { width: 280px; flex-shrink: 0; }
.main-panel { flex: 1; min-width: 0; }
.search-input { width: 100%; padding: 0.7rem 1rem; background: var(--surface); border: 1px solid var(--border); border-radius: 6px; color: var(--text); font-size: 1rem; margin-bottom: 1rem; }
.search-input:focus { outline: none; border-color: var(--accent); }
.filter-group { margin-bottom: 1rem; }
.filter-group h4 { color: var(--text2); font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 0.4rem; }
.filter-btn { display: inline-block; padding: 0.2rem 0.6rem; margin: 0.15rem; border-radius: 3px; border: 1px solid var(--border); background: var(--surface); color: var(--text2); font-size: 0.75rem; cursor: pointer; }
.filter-btn:hover { border-color: var(--accent); color: var(--text); }
.filter-btn.active { background: var(--accent2); border-color: var(--accent); color: #fff; }
.result-count { color: var(--text2); font-size: 0.85rem; margin-bottom: 0.8rem; }
.doc-list { max-height: calc(100vh - 200px); overflow-y: auto; }
.doc-item { background: var(--surface); border: 1px solid var(--border); border-radius: 6px; padding: 0.8rem; margin-bottom: 0.5rem; cursor: pointer; transition: border-color 0.15s; }
.doc-item:hover { border-color: var(--accent); }
.doc-item.selected { border-color: var(--accent); background: var(--surface2); }
.doc-id { font-weight: 700; color: var(--accent); font-size: 0.95rem; }
.doc-meta { font-size: 0.75rem; color: var(--text2); margin-top: 0.2rem; }
.doc-words { font-size: 0.8rem; color: var(--text); margin-top: 0.3rem; font-family: monospace; }
.doc-tag { display: inline-block; padding: 0.1rem 0.4rem; border-radius: 3px; font-size: 0.65rem; margin-right: 0.3rem; }
.tag-high { background: #1a2a1a; color: #4a9; }
.tag-medium { background: #1a2a3a; color: #5a8fc4; }
.tag-low { background: #2a2a1a; color: #888; }
.detail-panel { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 1.5rem; }
.detail-panel h2 { color: var(--accent); margin-bottom: 0.5rem; }
.detail-row { display: flex; gap: 0.5rem; margin-bottom: 0.3rem; font-size: 0.9rem; }
.detail-label { color: var(--text2); min-width: 100px; }
.detail-value { color: var(--text); }
.detail-words { margin-top: 1rem; }
.detail-words h3 { color: var(--text2); font-size: 0.85rem; margin-bottom: 0.5rem; }
.word-chip { display: inline-block; padding: 0.2rem 0.6rem; margin: 0.2rem; background: var(--surface2); border: 1px solid var(--border); border-radius: 4px; font-family: monospace; font-size: 0.85rem; color: var(--accent); cursor: pointer; }
.word-chip:hover { border-color: var(--accent); }
.unicode-text { font-size: 1.8rem; line-height: 2; margin: 1rem 0; padding: 1rem; background: var(--surface2); border-radius: 6px; word-break: break-all; }
.tablet-img { max-width: 100%; margin: 1rem 0; border-radius: 6px; border: 1px solid var(--border); background: #e8e0d0; padding: 0.5rem; }
.sign-grid { display: flex; flex-wrap: wrap; gap: 0.5rem; margin-top: 0.5rem; }
.sign-crop { width: 60px; height: 60px; object-fit: contain; background: #e8e0d0; border: 1px solid var(--border); border-radius: 4px; padding: 2px; }
.empty-state { color: var(--text2); text-align: center; padding: 3rem; font-size: 1.1rem; }
.back-link { color: var(--accent); text-decoration: none; font-size: 0.9rem; }
.sources { margin-top: 0.5rem; }
.src-badge { display: inline-block; padding: 0.1rem 0.4rem; border-radius: 3px; font-size: 0.65rem; margin-right: 0.2rem; background: var(--surface2); color: var(--text2); }
@media (max-width: 900px) {
  .browser { flex-direction: column; }
  .sidebar { width: 100%; }
}
</style>
</head>
<body>

<header>
  <div class="header-content">
    <div class="title-block">
      <h1>Linear A Corpus Browser</h1>
      <p class="subtitle">Search 1,880 documents across 55 sites</p>
    </div>
  </div>
</header>

<nav>
  <a href="index.html">Home</a>
  <a href="browse.html" style="color:var(--accent)">Browse</a>
  <a href="signs.html">Signs</a>
  <a href="terminology.html">Terms</a>
  <a href="discrepancies.html">Data Audit</a>
</nav>

<div class="browser">
  <div class="sidebar">
    <input type="text" class="search-input" id="search" placeholder="Search documents, words, signs..."/>

    <div class="filter-group">
      <h4>Object Type</h4>
      <div id="type-filters"></div>
    </div>

    <div class="filter-group">
      <h4>Linguistic Value</h4>
      <button class="filter-btn active" data-lv="all">All</button>
      <button class="filter-btn" data-lv="high">High</button>
      <button class="filter-btn" data-lv="medium">Medium</button>
      <button class="filter-btn" data-lv="low">Low</button>
    </div>

    <div class="filter-group">
      <h4>Site</h4>
      <div id="site-filters"></div>
    </div>

    <div class="result-count" id="resultCount"></div>
    <div class="doc-list" id="docList"></div>
  </div>

  <div class="main-panel">
    <div class="detail-panel" id="detail">
      <div class="empty-state">Select a document from the list, or search for a word or sign.</div>
    </div>
  </div>
</div>

<footer>
  <div class="footer-content">
    <div class="footer-left"><p><strong>Linear A Research Project</strong></p></div>
    <div class="footer-right"><p>Created by Matt Navarre &bull; <a href="https://github.com/navarre/minoan-linear-a">GitHub</a></p></div>
  </div>
</footer>

<script>
var DATA = null;
var allDocs = [];
var currentFilters = { type: 'all', lv: 'all', site: 'all', query: '' };
var IMG_BASE = 'images/documents/';

fetch('browser-data.json').then(r => r.json()).then(function(data) {
  DATA = data;
  allDocs = Object.keys(data).sort();
  buildFilters();
  applyFilters();
});

function buildFilters() {
  var types = {}, sites = {};
  allDocs.forEach(function(id) {
    var d = DATA[id];
    types[d.t || 'unknown'] = (types[d.t || 'unknown'] || 0) + 1;
    if (d.s) sites[d.s] = (sites[d.s] || 0) + 1;
  });

  var typeEl = document.getElementById('type-filters');
  typeEl.innerHTML = '<button class="filter-btn active" data-type="all">All</button>';
  Object.keys(types).sort(function(a,b) { return types[b] - types[a]; }).slice(0, 8).forEach(function(t) {
    typeEl.innerHTML += '<button class="filter-btn" data-type="' + t + '">' + t + ' (' + types[t] + ')</button>';
  });

  var siteEl = document.getElementById('site-filters');
  siteEl.innerHTML = '<button class="filter-btn active" data-site="all">All</button>';
  Object.keys(sites).sort(function(a,b) { return sites[b] - sites[a]; }).slice(0, 12).forEach(function(s) {
    siteEl.innerHTML += '<button class="filter-btn" data-site="' + s + '">' + s.substring(0, 15) + ' (' + sites[s] + ')</button>';
  });

  document.querySelectorAll('[data-type]').forEach(function(btn) {
    btn.addEventListener('click', function() {
      document.querySelectorAll('[data-type]').forEach(function(b) { b.classList.remove('active'); });
      this.classList.add('active');
      currentFilters.type = this.dataset.type;
      applyFilters();
    });
  });

  document.querySelectorAll('[data-lv]').forEach(function(btn) {
    btn.addEventListener('click', function() {
      document.querySelectorAll('[data-lv]').forEach(function(b) { b.classList.remove('active'); });
      this.classList.add('active');
      currentFilters.lv = this.dataset.lv;
      applyFilters();
    });
  });

  document.querySelectorAll('[data-site]').forEach(function(btn) {
    btn.addEventListener('click', function() {
      document.querySelectorAll('[data-site]').forEach(function(b) { b.classList.remove('active'); });
      this.classList.add('active');
      currentFilters.site = this.dataset.site;
      applyFilters();
    });
  });

  document.getElementById('search').addEventListener('input', function() {
    currentFilters.query = this.value.toLowerCase();
    applyFilters();
  });
}

function applyFilters() {
  var q = currentFilters.query;
  var results = allDocs.filter(function(id) {
    var d = DATA[id];
    if (currentFilters.type !== 'all' && d.t !== currentFilters.type) return false;
    if (currentFilters.lv !== 'all' && d.lv !== currentFilters.lv) return false;
    if (currentFilters.site !== 'all' && d.s !== currentFilters.site) return false;
    if (q) {
      var match = id.toLowerCase().indexOf(q) >= 0;
      if (!match && d.w) match = d.w.some(function(w) { return w.toLowerCase().indexOf(q) >= 0; });
      if (!match && d.s) match = d.s.toLowerCase().indexOf(q) >= 0;
      if (!match && d.u) match = d.u.toLowerCase().indexOf(q) >= 0;
      return match;
    }
    return true;
  });

  document.getElementById('resultCount').textContent = results.length + ' of ' + allDocs.length + ' documents';

  var list = document.getElementById('docList');
  var html = '';
  var shown = results.slice(0, 200);
  shown.forEach(function(id) {
    var d = DATA[id];
    var tagClass = d.lv === 'high' ? 'tag-high' : d.lv === 'medium' ? 'tag-medium' : 'tag-low';
    var words = (d.w || []).slice(0, 3).join(', ');
    html += '<div class="doc-item" data-id="' + id + '" onclick="showDoc(\'' + id.replace(/'/g, "\\'") + '\')">';
    html += '<span class="doc-id">' + id + '</span>';
    html += ' <span class="doc-tag ' + tagClass + '">' + (d.t || '?') + '</span>';
    html += '<div class="doc-meta">' + d.s + (d.p ? ' &bull; ' + d.p : '') + (d.sc ? ' &bull; ' + d.sc + ' signs' : '') + '</div>';
    if (words) html += '<div class="doc-words">' + words + (d.w && d.w.length > 3 ? '...' : '') + '</div>';
    html += '</div>';
  });
  if (results.length > 200) html += '<div class="doc-meta" style="padding:0.5rem">Showing 200 of ' + results.length + '. Refine your search.</div>';
  list.innerHTML = html;
}

function showDoc(id) {
  var d = DATA[id];
  if (!d) return;

  document.querySelectorAll('.doc-item').forEach(function(el) { el.classList.remove('selected'); });
  var sel = document.querySelector('[data-id="' + id + '"]');
  if (sel) sel.classList.add('selected');

  var tagClass = d.lv === 'high' ? 'tag-high' : d.lv === 'medium' ? 'tag-medium' : 'tag-low';

  var html = '<h2>' + id + '</h2>';
  html += '<div class="detail-row"><span class="detail-label">Site</span><span class="detail-value">' + (d.s || '—') + '</span></div>';
  html += '<div class="detail-row"><span class="detail-label">Type</span><span class="detail-value"><span class="doc-tag ' + tagClass + '">' + (d.t || '?') + '</span> ' + d.lv + ' linguistic value</span></div>';
  html += '<div class="detail-row"><span class="detail-label">Period</span><span class="detail-value">' + (d.p || '—') + '</span></div>';
  if (d.dim) html += '<div class="detail-row"><span class="detail-label">Dimensions</span><span class="detail-value">' + d.dim + '</span></div>';
  if (d.scr) html += '<div class="detail-row"><span class="detail-label">Scribe</span><span class="detail-value">' + d.scr + '</span></div>';
  html += '<div class="detail-row"><span class="detail-label">Signs</span><span class="detail-value">' + (d.sc || 0) + ' occurrences</span></div>';

  html += '<div class="sources"><span class="detail-label">Sources</span> ';
  (d.src || []).forEach(function(s) { html += '<span class="src-badge">' + s + '</span>'; });
  html += '</div>';

  // Unicode text
  if (d.u) {
    html += '<div style="margin-top:1rem"><h3 style="color:var(--text2);font-size:0.85rem;margin-bottom:0.3rem">Inscription (Unicode)</h3>';
    html += '<div class="unicode-text">' + d.u.replace(/\n/g, '<br>') + '</div></div>';
  }

  // Words
  if (d.w && d.w.length > 0) {
    html += '<div class="detail-words"><h3>Words (' + d.w.length + ')</h3>';
    d.w.forEach(function(w) {
      html += '<span class="word-chip" onclick="searchWord(\'' + w.replace(/'/g, "\\'") + '\')">' + w + '</span>';
    });
    html += '</div>';
  }

  // Tablet drawing image
  var siglaId = d.sid || id;
  var safeId = siglaId.replace(/ /g, '-').replace(/\+/g, '_plus_').replace(/α/g, 'alpha').replace(/β/g, 'beta').replace(/γ/g, 'gamma');
  var imgUrl = IMG_BASE + safeId + '/' + safeId + '.png';
  html += '<div style="margin-top:1rem"><h3 style="color:var(--text2);font-size:0.85rem;margin-bottom:0.3rem">Tablet Drawing</h3>';
  html += '<img class="tablet-img" src="' + imgUrl + '" alt="Drawing of ' + id + '" onerror="this.style.display=\'none\';this.nextElementSibling.style.display=\'block\'" />';
  html += '<p style="display:none;color:var(--text2);font-size:0.85rem">No drawing available for this document.</p></div>';

  // Sign crop images
  if (d.sc > 0) {
    html += '<div style="margin-top:1rem"><h3 style="color:var(--text2);font-size:0.85rem;margin-bottom:0.3rem">Individual Signs</h3><div class="sign-grid">';
    for (var i = 1; i <= Math.min(d.sc, 30); i++) {
      var cropUrl = IMG_BASE + safeId + '/' + safeId + '_' + i + '.png';
      html += '<img class="sign-crop" src="' + cropUrl + '" alt="Sign ' + i + '" title="Sign #' + i + '" onerror="this.style.display=\'none\'" loading="lazy" />';
    }
    if (d.sc > 30) html += '<span style="color:var(--text2);font-size:0.8rem;padding:0.5rem">+ ' + (d.sc - 30) + ' more</span>';
    html += '</div></div>';
  }

  document.getElementById('detail').innerHTML = html;
}

function searchWord(w) {
  document.getElementById('search').value = w;
  currentFilters.query = w.toLowerCase();
  applyFilters();
}
</script>
</body>
</html>
