<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Linear A Inscription Sites</title>
<link rel="stylesheet" href="style.css">
<script src="nav.js" defer></script>
<style>
.map-page { max-width: 1200px; margin: 0 auto; padding: 1.5rem 2rem; }
.map-container { position: relative; background: var(--surface); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; margin-bottom: 1.5rem; }
.map-container svg { width: 100%; height: auto; display: block; }

/* Site dots */
.site-dot { cursor: pointer; transition: all 0.2s; }
.site-dot:hover circle { stroke: var(--accent, #c49b5c); stroke-width: 2; }
.site-dot text { pointer-events: none; }

/* Tooltip */
.map-tooltip { position: absolute; background: var(--bg, #0a0a0f); border: 1px solid var(--accent, #c49b5c); border-radius: 6px; padding: 0.6rem 0.9rem; pointer-events: none; opacity: 0; transition: opacity 0.15s; z-index: 10; white-space: nowrap; }
.map-tooltip .tt-name { color: var(--accent, #c49b5c); font-weight: 700; font-size: 0.9rem; }
.map-tooltip .tt-count { color: var(--text2, #9090a0); font-size: 0.8rem; }
.map-tooltip .tt-desc { color: var(--text, #e0e0e8); font-size: 0.75rem; margin-top: 0.2rem; }

/* Site cards below map */
.sites-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1rem; }
.site-card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 1.2rem; cursor: pointer; transition: border-color 0.2s; }
.site-card:hover { border-color: var(--accent); }
.site-card h3 { color: var(--accent); font-size: 1rem; margin-bottom: 0.3rem; }
.site-card .site-count { color: var(--text); font-size: 1.5rem; font-weight: 700; }
.site-card .site-desc { color: var(--text2); font-size: 0.8rem; margin-top: 0.3rem; line-height: 1.5; }
.site-card .site-link { color: var(--accent); font-size: 0.8rem; text-decoration: none; margin-top: 0.5rem; display: inline-block; }
</style>
</head>
<body>

<header>
  <div class="header-content">
    <div class="title-block">
      <h1>Inscription Sites</h1>
      <p class="subtitle">Where Linear A was written, 1700-1450 BCE</p>
    </div>
  </div>
</header>

<div class="map-page">

<div class="map-container" id="mapContainer">
  <div class="map-tooltip" id="tooltip"></div>
  <svg viewBox="0 0 1000 470" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <radialGradient id="sea" cx="50%" cy="50%" r="50%">
        <stop offset="0%" stop-color="#0f1a2a"/>
        <stop offset="100%" stop-color="#0a1020"/>
      </radialGradient>
      <filter id="glow">
        <feGaussianBlur stdDeviation="3" result="blur"/>
        <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
      </filter>
    </defs>

    <!-- Sea -->
    <rect width="1000" height="470" fill="url(#sea)"/>

    <!-- Subtle grid -->
    <g stroke="#1a2535" stroke-width="0.3" opacity="0.3">
      <line x1="0" y1="120" x2="1000" y2="120"/>
      <line x1="0" y1="240" x2="1000" y2="240"/>
      <line x1="0" y1="360" x2="1000" y2="360"/>
      <line x1="250" y1="0" x2="250" y2="470"/>
      <line x1="500" y1="0" x2="500" y2="470"/>
      <line x1="750" y1="0" x2="750" y2="470"/>
    </g>

    <!-- Crete - real coastline from OpenStreetMap coordinates -->
    <path d="M 188.6,336.3 L 203.9,352.5 L 215.8,349.3 L 251.3,349.3 L 275.0,350.9 L 291.6,349.3 L 298.7,350.9 L 310.5,355.8 L 315.3,352.5 L 346.1,372.0 L 369.7,373.6 L 398.2,375.2 L 417.1,373.6 L 440.8,375.2 L 464.5,376.8 L 488.2,378.4 L 504.7,378.4 L 523.7,380.1 L 547.4,378.4 L 554.5,380.1 L 566.3,380.1 L 594.7,381.7 L 618.4,384.9 L 642.1,388.2 L 665.8,393.0 L 689.5,394.7 L 694.2,402.8 L 713.2,401.1 L 736.8,402.8 L 760.5,402.8 L 784.2,404.4 L 807.9,401.1 L 824.5,399.5 L 833.9,402.8 L 824.5,407.6 L 807.9,410.9 L 784.2,415.7 L 760.5,419.0 L 736.8,431.9 L 713.2,435.2 L 689.5,433.6 L 665.8,431.9 L 642.1,427.1 L 618.4,428.7 L 594.7,431.9 L 571.1,438.4 L 547.4,441.7 L 523.7,441.7 L 500.0,443.3 L 476.3,441.7 L 452.6,438.4 L 428.9,435.2 L 405.3,430.3 L 381.6,425.4 L 357.9,419.0 L 334.2,407.6 L 310.5,401.1 L 286.8,397.9 L 263.2,394.7 L 239.5,386.6 L 215.8,375.2 L 203.9,365.5 L 192.1,354.1 L 188.6,336.3 Z"
          fill="#1a1a25" stroke="#3a3a4a" stroke-width="1.5" stroke-linejoin="round"/>

    <!-- Thera (Santorini) -->
    <path d="M 606.6,203.4 L 613.7,200.2 L 623.2,201.8 L 630.3,205.0 L 635.0,209.9 L 632.6,214.8 L 625.5,218.0 L 618.4,216.4 L 611.3,213.1 L 606.6,208.3 L 606.6,203.4 Z"
          fill="#1a1a25" stroke="#3a3a4a" stroke-width="1"/>

    <!-- Kea island -->
    <path d="M 355.5,8.9 L 367.4,4.1 L 376.8,7.3 L 374.5,15.4 L 365.0,18.7 L 355.5,15.4 L 355.5,8.9 Z"
          fill="#1a1a25" stroke="#3a3a4a" stroke-width="1"/>

    <!-- Miletos hint (east edge) -->
    <path d="M 960,20 L 980,15 L 1000,12 L 1000,80 L 980,75 L 960,60 Z"
          fill="#1a1a25" stroke="#3a3a4a" stroke-width="1"/>

    <!-- Island labels -->
    <text x="620" y="232" fill="#4a4a5a" font-size="10" text-anchor="middle" font-style="italic">Thera</text>
    <text x="365" y="32" fill="#4a4a5a" font-size="9" text-anchor="middle" font-style="italic">Kea</text>
    <text x="975" y="55" fill="#4a4a5a" font-size="9" text-anchor="middle" font-style="italic">Miletos</text>

    <!-- CRETE label -->
    <text x="500" y="460" fill="#2a2a3a" font-size="13" text-anchor="middle" font-style="italic" letter-spacing="12">C R E T E</text>

    <!-- Aegean Sea label -->
    <text x="450" y="160" fill="#1a2a3a" font-size="18" text-anchor="middle" font-style="italic" letter-spacing="6" opacity="0.5">Aegean Sea</text>

    <!-- Libyan Sea label -->
    <text x="500" y="465" fill="#1a2a3a" font-size="10" text-anchor="middle" font-style="italic" opacity="0.3">Libyan Sea</text>

    <!-- ===== SITE DOTS (real coordinates) ===== -->

    <!-- Haghia Triada: 373 docs -->
    <g class="site-dot" data-site="HT" data-name="Haghia Triada" data-count="373" data-desc="Palace administrative center in the Messara plain. Largest cache of Linear A tablets anywhere.">
      <circle cx="397" cy="426" r="18" fill="#c49b5c" opacity="0.25"/>
      <circle cx="397" cy="426" r="10" fill="#c49b5c" opacity="0.7" filter="url(#glow)"/>
      <text x="397" y="430" fill="#fff" font-size="8" text-anchor="middle" font-weight="700">373</text>
    </g>

    <!-- Khania: 213 docs -->
    <g class="site-dot" data-site="KH" data-name="Khania" data-count="213" data-desc="Ancient Kydonia. Second largest Linear A archive. Western Crete.">
      <circle cx="291" cy="351" r="15" fill="#c49b5c" opacity="0.25"/>
      <circle cx="291" cy="351" r="9" fill="#c49b5c" opacity="0.7" filter="url(#glow)"/>
      <text x="291" y="355" fill="#fff" font-size="7" text-anchor="middle" font-weight="700">213</text>
    </g>

    <!-- Phaistos: 63 docs -->
    <g class="site-dot" data-site="PH" data-name="Phaistos" data-count="63" data-desc="Major palace near Haghia Triada. Home of the Phaistos Disc.">
      <circle cx="480" cy="427" r="12" fill="#c49b5c" opacity="0.25"/>
      <circle cx="480" cy="427" r="7" fill="#c49b5c" opacity="0.7" filter="url(#glow)"/>
      <text x="480" y="430" fill="#fff" font-size="7" text-anchor="middle" font-weight="700">63</text>
    </g>

    <!-- Zakros: 44 docs -->
    <g class="site-dot" data-site="ZA" data-name="Zakros" data-count="44" data-desc="Easternmost Minoan palace. Complete archive sealed by destruction ~1450 BCE.">
      <circle cx="822" cy="419" r="10" fill="#c49b5c" opacity="0.25"/>
      <circle cx="822" cy="419" r="6.5" fill="#c49b5c" opacity="0.7" filter="url(#glow)"/>
      <text x="822" y="423" fill="#fff" font-size="7" text-anchor="middle" font-weight="700">44</text>
    </g>

    <!-- Knossos: 31 docs -->
    <g class="site-dot" data-site="KN" data-name="Knossos" data-count="31" data-desc="Largest Minoan palace. Mostly Linear B, but some Linear A survives from earlier period.">
      <circle cx="562" cy="387" r="9" fill="#c49b5c" opacity="0.25"/>
      <circle cx="562" cy="387" r="6" fill="#c49b5c" opacity="0.7" filter="url(#glow)"/>
      <text x="562" y="390" fill="#fff" font-size="6" text-anchor="middle" font-weight="700">31</text>
    </g>

    <!-- Mallia: 20 docs -->
    <g class="site-dot" data-site="MA" data-name="Mallia" data-count="20" data-desc="Palace on the north coast. Administrative tablets and a ceremonial sword.">
      <circle cx="639" cy="388" r="8" fill="#c49b5c" opacity="0.25"/>
      <circle cx="639" cy="388" r="5.5" fill="#c49b5c" opacity="0.7" filter="url(#glow)"/>
      <text x="639" y="391" fill="#fff" font-size="6" text-anchor="middle" font-weight="700">20</text>
    </g>

    <!-- Arkhanes: 10 docs -->
    <g class="site-dot" data-site="ARKH" data-name="Arkhanes" data-count="10" data-desc="South of Knossos. Palatial and funerary contexts. Ivory scepter find.">
      <circle cx="562" cy="397" r="6" fill="#c49b5c" opacity="0.25"/>
      <circle cx="562" cy="397" r="4.5" fill="#c49b5c" opacity="0.7"/>
    </g>

    <!-- Tylissos: 3 docs -->
    <g class="site-dot" data-site="TY" data-name="Tylissos" data-count="3" data-desc="Three Minoan villas west of Knossos.">
      <circle cx="524" cy="386" r="4.5" fill="#c49b5c" opacity="0.25"/>
      <circle cx="524" cy="386" r="3" fill="#c49b5c" opacity="0.7"/>
    </g>

    <!-- Syme Viannou: 1 doc -->
    <g class="site-dot" data-site="SY" data-name="Syme Viannou" data-count="1" data-desc="Mountain peak sanctuary. Ritual inscriptions.">
      <circle cx="675" cy="424" r="4.5" fill="#c49b5c" opacity="0.25"/>
      <circle cx="675" cy="424" r="3" fill="#c49b5c" opacity="0.7"/>
    </g>

    <!-- Gournia: 2 docs -->
    <g class="site-dot" data-site="GO" data-name="Gournia" data-count="2" data-desc="Small Minoan town. One of few non-palatial sites with inscriptions.">
      <circle cx="698" cy="393" r="4.5" fill="#c49b5c" opacity="0.25"/>
      <circle cx="698" cy="393" r="3" fill="#c49b5c" opacity="0.7"/>
    </g>

    <!-- Pyrgos: 2 docs -->
    <g class="site-dot" data-site="PYR" data-name="Pyrgos" data-count="2" data-desc="South-central Crete.">
      <circle cx="505" cy="432" r="4.5" fill="#c49b5c" opacity="0.25"/>
      <circle cx="505" cy="432" r="3" fill="#c49b5c" opacity="0.7"/>
    </g>

    <!-- Off-Crete: Kea -->
    <g class="site-dot" data-site="KE" data-name="Kea" data-count="5" data-desc="Aegean island. Ayia Irini excavations show Minoan cultural contact.">
      <circle cx="365" cy="11" r="5" fill="#5a8fc4" opacity="0.25"/>
      <circle cx="365" cy="11" r="3.5" fill="#5a8fc4" opacity="0.7"/>
    </g>

    <!-- Off-Crete: Miletos -->
    <g class="site-dot" data-site="MI" data-name="Miletos" data-count="1" data-desc="Anatolian coast. Minoan trading colony. Easternmost Linear A find.">
      <circle cx="975" cy="40" r="5" fill="#5a8fc4" opacity="0.25"/>
      <circle cx="975" cy="40" r="3.5" fill="#5a8fc4" opacity="0.7"/>
    </g>

    <!-- Site labels -->
    <text x="397" y="413" fill="#c49b5c" font-size="9" text-anchor="middle" font-weight="600">Haghia Triada</text>
    <text x="291" y="340" fill="#9090a0" font-size="9" text-anchor="middle">Khania</text>
    <text x="480" y="417" fill="#9090a0" font-size="8" text-anchor="middle">Phaistos</text>
    <text x="562" y="378" fill="#9090a0" font-size="9" text-anchor="middle">Knossos</text>
    <text x="639" y="380" fill="#9090a0" font-size="8" text-anchor="middle">Mallia</text>
    <text x="822" y="409" fill="#9090a0" font-size="8" text-anchor="middle">Zakros</text>
    <text x="580" y="404" fill="#6a6a7a" font-size="7" text-anchor="start">Arkhanes</text>
    <text x="698" y="385" fill="#6a6a7a" font-size="7" text-anchor="middle">Gournia</text>

    <!-- Legend -->
    <g transform="translate(30,30)">
      <rect x="0" y="0" width="185" height="75" rx="6" fill="#0a0a0f" opacity="0.85" stroke="#2a2a3a"/>
      <circle cx="20" cy="22" r="6" fill="#c49b5c" opacity="0.7"/>
      <text x="34" y="26" fill="#e0e0e8" font-size="10">Cretan sites</text>
      <circle cx="20" cy="45" r="6" fill="#5a8fc4" opacity="0.7"/>
      <text x="34" y="49" fill="#e0e0e8" font-size="10">Aegean / Anatolian</text>
      <text x="20" y="65" fill="#9090a0" font-size="8">Dot size = inscription count</text>
    </g>

    <!-- Scale bar -->
    <g transform="translate(830,440)">
      <line x1="0" y1="0" x2="95" y2="0" stroke="#4a4a5a" stroke-width="1.5"/>
      <line x1="0" y1="-3" x2="0" y2="3" stroke="#4a4a5a" stroke-width="1.5"/>
      <line x1="95" y1="-3" x2="95" y2="3" stroke="#4a4a5a" stroke-width="1.5"/>
      <text x="47" y="14" fill="#4a4a5a" font-size="8" text-anchor="middle">50 km</text>
    </g>
  </svg>
</div>

<!-- Site cards -->
<h2 style="color:var(--accent);font-size:1.3rem;margin-bottom:1rem;">Major Sites</h2>
<div class="sites-grid" id="sitesGrid"></div>

</div>

<script>
const siteData = [
  { code: 'HT', name: 'Haghia Triada', count: 373, desc: 'The single richest source of Linear A. A palatial administrative center in the Messara plain of south-central Crete. Hundreds of clay tablets recording commodity transactions, personnel lists, and totals. Most of what we know about Minoan bookkeeping comes from here.' },
  { code: 'KH', name: 'Khania (Kydonia)', count: 213, desc: 'Ancient Kydonia in western Crete. The second largest archive, discovered in modern excavations beneath the city of Chania. Includes tablets, nodules, and roundels. Important for showing that Linear A administration was island-wide, not just in the Messara.' },
  { code: 'PH', name: 'Phaistos', count: 63, desc: 'Major Minoan palace near Haghia Triada. Home of the famous Phaistos Disc (which may not be Linear A). Administrative tablets and clay documents from palatial contexts.' },
  { code: 'ZA', name: 'Zakros', count: 44, desc: 'The easternmost Minoan palace, on the far east coast of Crete. A complete palace archive was found here, sealed by the destruction that ended the Neopalatial period around 1450 BCE.' },
  { code: 'KN', name: 'Knossos', count: 31, desc: 'The largest and most famous Minoan palace. Knossos is better known for Linear B (the later Greek script), but some Linear A tablets and ritual inscriptions survive from the earlier period.' },
  { code: 'MA', name: 'Mallia', count: 20, desc: 'A Minoan palace on the north coast, east of Heraklion. Known for the famous gold bee pendant. Administrative tablets and a ceremonial sword with inscriptions.' },
  { code: 'ARKH', name: 'Arkhanes', count: 10, desc: 'A town south of Knossos with both palatial and funerary architecture. Inscriptions from burial and ritual contexts, including the remarkable ivory scepter find.' },
  { code: 'KE', name: 'Kea (Ayia Irini)', count: 5, desc: 'An Aegean island north of Crete. The Ayia Irini settlement shows strong Minoan cultural influence. Linear A inscriptions here prove the script traveled beyond Crete.' },
  { code: 'TY', name: 'Tylissos', count: 3, desc: 'Three Minoan villas west of Knossos. A small but significant site showing that Linear A was used outside the major palaces.' },
  { code: 'MI', name: 'Miletos', count: 1, desc: 'On the Anatolian coast (modern Turkey). A Minoan trading colony. The single Linear A find here marks the easternmost extent of the script.' },
  { code: 'MY', name: 'Mycenae', count: 1, desc: 'The famous citadel on mainland Greece. A single Linear A inscription found here suggests contact between Minoans and Mycenaeans before the script was replaced by Linear B.' }
];

// Build site cards
const grid = document.getElementById('sitesGrid');
for (const s of siteData) {
  const card = document.createElement('div');
  card.className = 'site-card';
  card.innerHTML = `
    <h3>${s.name}</h3>
    <div class="site-count">${s.count} <span style="font-size:0.7rem;color:var(--text2);font-weight:400">documents</span></div>
    <div class="site-desc">${s.desc}</div>
    <a class="site-link" href="gallery.html?site=${s.code}">View inscriptions →</a>
  `;
  card.onclick = (e) => {
    if (e.target.tagName !== 'A') window.location = `gallery.html?site=${s.code}`;
  };
  grid.appendChild(card);
}

// Tooltip handling
const tooltip = document.getElementById('tooltip');
const container = document.getElementById('mapContainer');

document.querySelectorAll('.site-dot').forEach(dot => {
  dot.addEventListener('mouseenter', (e) => {
    const name = dot.dataset.name;
    const count = dot.dataset.count;
    const desc = dot.dataset.desc;
    tooltip.innerHTML = `<div class="tt-name">${name}</div><div class="tt-count">${count} inscriptions</div><div class="tt-desc">${desc}</div>`;
    tooltip.style.opacity = '1';
  });
  dot.addEventListener('mousemove', (e) => {
    const rect = container.getBoundingClientRect();
    tooltip.style.left = (e.clientX - rect.left + 15) + 'px';
    tooltip.style.top = (e.clientY - rect.top - 10) + 'px';
  });
  dot.addEventListener('mouseleave', () => {
    tooltip.style.opacity = '0';
  });
  dot.addEventListener('click', () => {
    const code = dot.dataset.site;
    window.location = `gallery.html?site=${code}`;
  });
});
</script>
</body>
</html>
